<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9B8A"/>
      <stop offset="100%" stop-color="#0E8F80"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#28A745"/>
    </linearGradient>
    <linearGradient id="crossGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
  </defs>

  <!-- Medical Cross -->
  <rect x="180" y="80" width="152" height="352" rx="32" ry="32" fill="url(#crossGrad)"/>
  <rect x="80" y="180" width="352" height="152" rx="32" ry="32" fill="url(#crossGrad)"/>

  <!-- Leaf -->
  <path d="M340 80 C340 80, 420 40, 430 110 C440 180, 370 170, 340 150 Z" fill="url(#leafGrad)"/>
  <path d="M345 85 C370 110, 390 130, 410 105" stroke="#1E7D34" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
